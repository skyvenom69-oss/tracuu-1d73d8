const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(DATA.s), iterations:DATA.it, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, true, ['decrypt']);
}
async function tryOpen(key){
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(DATA.i)}, key, b64(DATA.c));
  const html = new TextDecoder().decode(plain);
  document.open(); document.write(html); document.close();
}
async function remember(key){
  try{
    const raw = await crypto.subtle.exportKey('raw', key);
    localStorage.setItem('tdak', btoa(String.fromCharCode(...new Uint8Array(raw))));
  }catch(e){}
}

      document.getElementById('load').hidden = false;
      await tryOpen(key);
      return;
    }catch(e){ localStorage.removeItem('tdak'); document.getElementById('load').hidden = true; }
  }
})();
document.getElementById('f').onsubmit = async ev => {
  ev.preventDefault();
  const btn = document.getElementById('btn'), err = document.getElementById('err');
  btn.disabled = true; err.textContent = '';
  document.getElementById('load').hidden = false;
  try{
    const key = await deriveKey(document.getElementById('pw').value);
    await tryOpen(key);
    await remember(key);
  }catch(e){
    document.getElementById('load').hidden = true;
    err.textContent = 'Sai mật khẩu — thử lại';
    btn.disabled = false;
  }
};
</script>
